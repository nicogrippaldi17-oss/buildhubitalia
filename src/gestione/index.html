<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Hub — Gestione</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #021164; }
    .gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 1rem; }
    .gate-box { background: #fff; padding: 2.5rem 2rem; border-radius: 16px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
    .gate-box img { height: 48px; margin-bottom: 1.5rem; display: block; margin-left: auto; margin-right: auto; }
    .gate-box h1 { font-size: 1.25rem; color: #021164; margin-bottom: 1.75rem; font-weight: 700; }
    .gate-box input { width: 100%; padding: 0.875rem 1rem; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .gate-box input:focus { border-color: #2563EB; }
    .gate-box button { width: 100%; padding: 0.875rem; background: #021164; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .gate-box button:hover { background: #001044; }
    .gate-box .error { color: #dc2626; font-size: 0.875rem; margin-top: 0.75rem; display: none; }
    .gate-box .error.show { display: block; }
  </style>
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-box">
      <img src="/img/logo.png" alt="Build Hub" />
      <h1>Area Riservata</h1>
      <input type="password" id="pwd" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')checkPassword()" />
      <button onclick="checkPassword()">Accedi</button>
      <p class="error" id="error">Password non valida</p>
    </div>
  </div>

  <script>
    var HASH = '3d8b0397d91c1135241f11222cff333cadde884c43668f415d600de1584b06ed';

    async function sha256(message) {
      var msgBuffer = new TextEncoder().encode(message);
      var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    async function checkPassword() {
      var input = document.getElementById('pwd').value;
      var hash = await sha256(input);
      if (hash === HASH) {
        sessionStorage.setItem('bh_auth', '1');
        document.getElementById('gate').style.display = 'none';
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@^3/dist/decap-cms.js';
        document.head.appendChild(s);
      } else {
        document.getElementById('error').classList.add('show');
      }
    }

    if (sessionStorage.getItem('bh_auth') === '1') {
      document.getElementById('gate').style.display = 'none';
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/decap-cms@^3/dist/decap-cms.js';
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
